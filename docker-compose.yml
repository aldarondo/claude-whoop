services:
  claude-whoop:
    image: node:20-alpine
    container_name: claude-whoop
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - WHOOP_CLIENT_ID=${WHOOP_CLIENT_ID}
      - WHOOP_CLIENT_SECRET=${WHOOP_CLIENT_SECRET}
      - WHOOP_ACCESS_TOKEN=${WHOOP_ACCESS_TOKEN}
      - WHOOP_REFRESH_TOKEN=${WHOOP_REFRESH_TOKEN}
      - WHOOP_TOKEN_EXPIRES_AT=${WHOOP_TOKEN_EXPIRES_AT:-0}
      - PORT=${PORT:-8770}
      - BRIAN_MEM_URL=${BRIAN_MEM_URL:-}
      - BRIAN_MCP_CLIENT_ID=${BRIAN_MCP_CLIENT_ID:-}
      - BRIAN_MCP_CLIENT_SECRET=${BRIAN_MCP_CLIENT_SECRET:-}
    command: node src/serve.js
    network_mode: host
